version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: dev-hwhub-db

    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_ja_0900_as_cs

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: hwhub
      MYSQL_DATABASE: hwhub_db
      MYSQL_USER: hwhub
      MYSQL_PASSWORD: hwhub
      TZ: 'Asia/Tokyo'
      MYSQL_DEFAULT_AUTHENTICATION_PLUGIN: mysql_native_password
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      # 永続化ボリューム（データを保持）
      - hwhub_db:/var/lib/mysql

volumes:
  hwhub_db:
    driver: local